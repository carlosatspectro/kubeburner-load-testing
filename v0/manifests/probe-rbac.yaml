apiVersion: v1
kind: Namespace
metadata:
  name: kb-probe
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: probe-sa
  namespace: kb-probe
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kb-probe-reader
rules:
  - nonResourceURLs: ["/readyz", "/healthz", "/livez"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["nodes", "configmaps", "namespaces"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kb-probe-reader-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kb-probe-reader
subjects:
  - kind: ServiceAccount
    name: probe-sa
    namespace: kb-probe
