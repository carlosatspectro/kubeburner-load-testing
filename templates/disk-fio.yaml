{{- if eq (default "false" .DISK_ENABLED) "true" }}
apiVersion: batch/v1
kind: Job
metadata:
  generateName: noisy-neighbor-fio-step-{{.STEP}}-
  namespace: {{.NAMESPACE}}
  labels:
    app.kubernetes.io/name: noisy-neighbor
    app.kubernetes.io/component: disk-fio
    app.kubernetes.io/part-of: noisy-neighbor
spec:
  parallelism: {{ mul .STEP .FIO_PARALLELISM_STEP }}
  completions: {{ mul .STEP .FIO_PARALLELISM_STEP }}
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: noisy-neighbor
        app.kubernetes.io/component: disk-fio
        app.kubernetes.io/part-of: noisy-neighbor
    spec:
      restartPolicy: Never
      containers:
        - name: fio
          image: ghcr.io/axboe/fio:latest
          imagePullPolicy: IfNotPresent
          args:
            - --name=io-stress
            - --directory=/work
            - --rw={{.FIO_RW}}
            - --bs={{.FIO_BS}}
            - --iodepth={{.FIO_IODEPTH}}
            - --size={{.FIO_SIZE}}
            - --time_based
            - --runtime={{.FIO_RUNTIME}}
            - --group_reporting
          volumeMounts:
            - name: fio-workdir
              mountPath: /work
      volumes:
        - name: fio-workdir
          persistentVolumeClaim:
            claimName: {{.FIO_PVC_NAME}}
{{- else }}
apiVersion: batch/v1
kind: Job
metadata:
  generateName: noisy-neighbor-noop-disk-step-{{ default 0 .STEP }}-
  namespace: {{ default "default" .NAMESPACE }}
  labels:
    app.kubernetes.io/name: noisy-neighbor
    app.kubernetes.io/component: disk-fio
    app.kubernetes.io/part-of: noisy-neighbor
spec:
  parallelism: 1
  completions: 1
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: noisy-neighbor
        app.kubernetes.io/component: disk-fio
        app.kubernetes.io/part-of: noisy-neighbor
    spec:
      restartPolicy: Never
      containers:
        - name: noop
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - echo noop
{{- end }}
