{{- if eq (default "false" .DISK_ENABLED) "true" }}
apiVersion: batch/v1
kind: Job
metadata:
  generateName: noisy-neighbor-fio-cleanup-
  namespace: {{.NAMESPACE}}
  labels:
    app.kubernetes.io/name: noisy-neighbor
    app.kubernetes.io/component: fio-pvc-cleanup
    app.kubernetes.io/part-of: noisy-neighbor
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: noisy-neighbor
        app.kubernetes.io/component: fio-pvc-cleanup
        app.kubernetes.io/part-of: noisy-neighbor
    spec:
      restartPolicy: Never
      serviceAccountName: noisy-neighbor-fio-cleanup
      containers:
        - name: cleanup
          image: registry.k8s.io/kubectl:v1.29.0
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              kubectl delete pvc "{{.FIO_PVC_NAME}}" --ignore-not-found
{{- else }}
apiVersion: batch/v1
kind: Job
metadata:
  generateName: noisy-neighbor-noop-fio-cleanup-
  namespace: {{ default "default" .NAMESPACE }}
  labels:
    app.kubernetes.io/name: noisy-neighbor
    app.kubernetes.io/component: fio-pvc-cleanup
    app.kubernetes.io/part-of: noisy-neighbor
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: noisy-neighbor
        app.kubernetes.io/component: fio-pvc-cleanup
        app.kubernetes.io/part-of: noisy-neighbor
    spec:
      restartPolicy: Never
      containers:
        - name: noop
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - echo noop
{{- end }}
