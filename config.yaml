NAMESPACE: noisy-neighbor

# Run ./cleanup.sh before applying RBAC and starting kube-burner (idempotent).
CLEANUP_BEFORE_RUN: "true"

BASELINE_DURATION: "30s"
STEP_DURATION: "30s"
RECOVERY_DURATION: "30s"
STEPS: 2

PROBE_INTERVAL: "5s"
PROBE_TIMEOUT: "5s"

CPU_ENABLED: "true"
CPU_REPLICAS_STEP: 1
CPU_WORKERS: 1

MEM_ENABLED: "true"
MEM_REPLICAS_STEP: 1
MEM_WORKERS: 1
MEM_BYTES: "64Mi"

DISK_ENABLED: "false"
FIO_PARALLELISM_STEP: 1
FIO_RW: "randrw"
FIO_BS: "4k"
FIO_IODEPTH: 4
FIO_SIZE: "256Mi"
FIO_RUNTIME: "30s"
FIO_PVC_SIZE: "1Gi"
FIO_PVC_NAME: noisy-neighbor-fio

# Optional: override kubeconfig for run.sh
KUBECONFIG: ""
