global:
  waitWhenFinished: true

jobs:
  - name: baseline-probes
    namespace: __NAMESPACE__
    namespacedIterations: false
    jobType: create
    jobIterations: 1
    qps: 5
    burst: 10
    podWait: true
    waitWhenFinished: true
    verifyObjects: false
    jobPause: "0s"
    maxWaitTimeout: 10m
    cleanup: false
    objects:
      - objectTemplate: templates/probe-job.yaml
        inputVars:
          PROBE_PHASE: baseline
          PROBE_DURATION: __FROM_CONFIG__
          PROBE_INTERVAL: __FROM_CONFIG__
          PROBE_TIMEOUT: __FROM_CONFIG__
          NAMESPACE: __NAMESPACE__

  - name: ramp-step-1
    namespace: __NAMESPACE__
    namespacedIterations: false
    jobType: create
    jobIterations: 1
    qps: 5
    burst: 10
    podWait: true
    waitWhenFinished: true
    verifyObjects: false
    jobPause: "0s"
    maxWaitTimeout: 10m
    cleanup: false
    objects:
      - objectTemplate: templates/cpu-stress.yaml
        inputVars:
          CPU_ENABLED: __FROM_CONFIG__
          STEP: 1
          CPU_REPLICAS_STEP: __FROM_CONFIG__
          CPU_WORKERS: __FROM_CONFIG__
          NAMESPACE: __NAMESPACE__
      - objectTemplate: templates/mem-stress.yaml
        inputVars:
          MEM_ENABLED: __FROM_CONFIG__
          STEP: 1
          MEM_REPLICAS_STEP: __FROM_CONFIG__
          MEM_WORKERS: __FROM_CONFIG__
          MEM_BYTES: __FROM_CONFIG__
          NAMESPACE: __NAMESPACE__
      - objectTemplate: templates/disk-fio.yaml
        inputVars:
          DISK_ENABLED: __FROM_CONFIG__
          STEP: 1
          FIO_PARALLELISM_STEP: __FROM_CONFIG__
          FIO_RW: __FROM_CONFIG__
          FIO_BS: __FROM_CONFIG__
          FIO_IODEPTH: __FROM_CONFIG__
          FIO_SIZE: __FROM_CONFIG__
          FIO_RUNTIME: __FROM_CONFIG__
          FIO_PVC_SIZE: __FROM_CONFIG__
          FIO_PVC_NAME: __FROM_CONFIG__
          NAMESPACE: __NAMESPACE__
      - objectTemplate: templates/probe-job.yaml
        inputVars:
          PROBE_PHASE: ramp-step-1
          PROBE_DURATION: __FROM_CONFIG__
          PROBE_INTERVAL: __FROM_CONFIG__
          PROBE_TIMEOUT: __FROM_CONFIG__
          NAMESPACE: __NAMESPACE__

  - name: recovery-probes
    namespace: __NAMESPACE__
    namespacedIterations: false
    jobType: create
    jobIterations: 1
    qps: 5
    burst: 10
    podWait: true
    waitWhenFinished: true
    verifyObjects: false
    jobPause: "0s"
    maxWaitTimeout: 10m
    cleanup: false
    objects:
      - objectTemplate: templates/probe-job.yaml
        inputVars:
          PROBE_PHASE: recovery
          PROBE_DURATION: __FROM_CONFIG__
          PROBE_INTERVAL: __FROM_CONFIG__
          PROBE_TIMEOUT: __FROM_CONFIG__
          NAMESPACE: __NAMESPACE__

  - name: fio-pvc-cleanup
    namespace: __NAMESPACE__
    namespacedIterations: false
    jobType: create
    jobIterations: 1
    qps: 5
    burst: 10
    podWait: true
    waitWhenFinished: true
    verifyObjects: false
    jobPause: "0s"
    maxWaitTimeout: 10m
    cleanup: true
    objects:
      - objectTemplate: templates/fio-pvc-cleanup.yaml
        inputVars:
          DISK_ENABLED: __FROM_CONFIG__
          FIO_PVC_NAME: __FROM_CONFIG__
          NAMESPACE: __NAMESPACE__
